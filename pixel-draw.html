<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>在线WP色板绘画 - Wpalce-Master</title>
    <link rel="stylesheet" href="css/pixel-draw.css">
    <script src="config/color-info.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 左侧色板区域 -->
        <div class="palette-area">
            <!-- 移动端色板容器 -->
            <div class="palette-mobile-container">
                <div class="color-grid" id="free-colors"></div>
                <div class="color-grid" id="paid-colors"></div>
            </div>

            <!-- 桌面端色板（保持原有结构） -->
            <div class="palette-desktop-header">
                <span class="palette-label">免费颜色</span>
            </div>
            <div class="color-grid desktop-only" id="free-colors-desktop"></div>
            
            <div class="palette-desktop-header">
                <span class="palette-label">付费颜色</span>
                <span class="paid-badge">💎</span>
            </div>
            <div class="color-grid desktop-only" id="paid-colors-desktop"></div>

            <!-- 当前选中颜色 -->
            <div class="current-color-section">
                <div class="current-color-preview" id="current-color-preview"></div>
                <span class="current-color-name" id="current-color-name">Black</span>
            </div>
        </div>

        <!-- 画布区域 -->
        <div class="canvas-area">
            <!-- 顶部工具栏 -->
            <div class="toolbar" id="toolbar">
                <a href="index.html" class="back-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    <span>返回转换器</span>
                </a>
                
                <div class="toolbar-divider"></div>

                <button class="tool-btn" data-tool="move" title="移动 (M)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="5 9 2 12 5 15"/>
                        <polyline points="9 5 12 2 15 5"/>
                        <polyline points="15 19 12 22 9 19"/>
                        <polyline points="19 9 22 12 19 15"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <line x1="12" y1="2" x2="12" y2="22"/>
                    </svg>
                </button>
                <button class="tool-btn active" data-tool="pencil" title="铅笔 (B)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 20H7L3 16l9-9 8 8-4 4z"/>
                        <path d="M6 11l8 8"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="fill" title="填充 (G)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 11l-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11z"/>
                        <path d="M5 21c.6-1.8 2.6-3 4-3 1.4 0 2.6 2 4 2 1 0 2-1 2-2 0-2-3-3-3-5"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="global-fill" title="全局填充 (Shift+G)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M7 7h10v10H7z" fill="currentColor" opacity="0.3"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="picker" title="取色器 (I)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 22l1-1h3l9-9"/>
                        <path d="M3 21v-3l9-9"/>
                        <path d="M14.5 5.5L18 2l4 4-3.5 3.5"/>
                        <path d="M12 8l4 4"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="line" title="直线 (L)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="19" x2="19" y2="5"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="rect" title="矩形 (R)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                    </svg>
                </button>
                <button class="tool-btn" data-tool="circle" title="圆形 (C)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </button>
                
                <div class="toolbar-divider"></div>

                <!-- 笔刷大小控制 -->
                <div class="brush-size-control">
                    <span class="brush-size-label">笔刷:</span>
                    <input type="range" id="brush-size" min="1" max="20" value="1" class="brush-size-slider">
                    <span class="brush-size-value" id="brush-size-value">1</span>
                </div>

                <div class="toolbar-divider"></div>

                <!-- 自动描边按钮 -->
                <button class="tool-btn" id="outline-btn" title="自动描边">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/>
                        <rect x="6" y="6" width="12" height="12" rx="1"/>
                    </svg>
                </button>
                
                <button class="tool-btn" id="undo-btn" title="撤销 (Ctrl+Z)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v6h6"/>
                        <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                    </svg>
                </button>
                <button class="tool-btn" id="redo-btn" title="重做 (Ctrl+Y)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 7v6h-6"/>
                        <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
                    </svg>
                </button>

                <div class="toolbar-divider"></div>

                <button class="tool-btn" id="grid-toggle" title="切换网格">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                        <line x1="15" y1="3" x2="15" y2="21"/>
                    </svg>
                </button>
                <button class="tool-btn" id="center-canvas-btn" title="画布回归中心">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="3"/>
                        <line x1="12" y1="2" x2="12" y2="4"/>
                        <line x1="12" y1="20" x2="12" y2="22"/>
                        <line x1="2" y1="12" x2="4" y2="12"/>
                        <line x1="20" y1="12" x2="22" y2="12"/>
                    </svg>
                </button>

                <div class="toolbar-spacer"></div>

                <button class="action-btn danger" id="clear-btn">清空</button>
                <button class="action-btn primary" id="download-btn">保存PNG</button>
            </div>

            <!-- 画布容器 -->
            <div class="canvas-container" id="canvas-container">
                <div class="canvas-viewport" id="canvas-viewport">
                    <canvas id="pixel-canvas"></canvas>
                </div>
            </div>

            <!-- 底部状态栏 -->
            <div class="status-bar">
                <div class="canvas-info">
                    <span id="canvas-size-info">画布: 0×0</span>
                </div>
                
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoom-out">−</button>
                    <span class="zoom-level" id="zoom-level">20x</span>
                    <button class="zoom-btn" id="zoom-in">+</button>
                </div>

                <div class="bg-colors">
                    <button class="bg-color-btn active" data-color="#f8f4f0" style="background:#f8f4f0" title="米色"></button>
                    <button class="bg-color-btn" data-color="#9ebdff" style="background:#9ebdff" title="蓝色"></button>
                    <button class="bg-color-btn" data-color="#f7efc3" style="background:#f7efc3" title="黄色"></button>
                    <button class="bg-color-btn" data-color="#d3eac0" style="background:#d3eac0" title="绿色"></button>
                </div>

                <div class="import-section">
                    <input type="file" id="import-file" accept="image/*" style="display: none;">
                    <button class="action-btn primary" id="new-canvas-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <span>创建画布</span>
                    </button>
                    <button class="action-btn" id="import-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span>导入图片</span>
                    </button>
                </div>
            </div>

            <!-- 占位 -->
            <footer class="mobile-footer placeholder-footer">
                <p>
                    本页仓库 <a href="https://github.com/CoralHymn/Wplace-Master" target="_blank">github</a>
                    由【和平之师】制作
                </p>
                <p>这是因部分移动端浏览器策略所添加的占位符</p>
            </footer>
        </div>

        <!-- 图层面板 -->
        <div class="layers-panel" id="layers-panel">
            <div class="layers-panel-header">
                <h3>图层</h3>
                <div class="layers-panel-toggle" id="layers-panel-close" title="关闭图层面板">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </div>
            </div>
            <div class="layers-list" id="layers-list">
            </div>
            <div class="layers-actions">
                <button class="layer-action-btn" id="add-layer-btn" title="新建图层">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
                <button class="layer-action-btn" id="delete-layer-btn" title="删除图层">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                </button>
                <button class="layer-action-btn" id="duplicate-layer-btn" title="复制图层">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
                <button class="layer-action-btn" id="merge-down-btn" title="向下合并">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="17 11 12 6 7 11"/>
                        <polyline points="17 18 12 13 7 18"/>
                    </svg>
                </button>
                <button class="layer-action-btn" id="move-layer-up-btn" title="上移图层">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="18 15 12 9 6 15"/>
                    </svg>
                </button>
                <button class="layer-action-btn" id="move-layer-down-btn" title="下移图层">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/pixel-draw.js"></script>
</body>
</html>
